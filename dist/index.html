<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integration Window Calculator</title>
  <script type="module" crossorigin src="./assets/index-DOJJK1WC.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CYL9TS9q.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 data-i18n="title">Astro Planner</h1>
      <div class="header-right">
        <button id="fetch-catalog-btn" class="fetch-btn">
          <span id="fetch-btn-text" data-i18n="loadCatalog">Load catalog</span>
          <span id="fetch-spinner" class="spinner hidden"></span>
        </button>
        <select id="lang-select" class="lang-select"></select>
      </div>
    </header>

    <section class="controls">
      <div class="input-group">
        <label for="simbad-input" data-i18n="object">Object</label>
        <div class="input-with-status">
          <div class="autocomplete-wrapper">
            <input type="text" id="simbad-input" data-i18n-placeholder="objectPlaceholder" placeholder="e.g. M31, NGC 7000, Vega" autocomplete="off" />
            <ul id="autocomplete-list" class="autocomplete-list hidden"></ul>
          </div>
          <span id="simbad-status" class="status-icon"></span>
        </div>
        <span id="simbad-name" class="resolved-name"></span>
      </div>

      <div class="input-group">
        <label data-i18n="location">Location</label>
        <div class="location-fields">
          <input type="number" id="lat-input" step="0.0001" placeholder="Lat" />
          <input type="number" id="lon-input" step="0.0001" placeholder="Lon" />
          <button id="geo-btn" data-i18n-title="detectLocation" title="Detect location">&#9678;</button>
        </div>
      </div>

      <div class="input-group">
        <label for="min-alt-input" data-i18n="minAlt">Min altitude</label>
        <div class="min-alt-row">
          <input type="number" id="min-alt-input" value="30" min="0" max="90" step="5" />
          <span class="unit-label">&deg;</span>
        </div>
      </div>

      <div class="input-group">
        <label for="horizon-file" data-i18n="horizonFile">Horizon file</label>
        <div class="file-upload">
          <input type="file" id="horizon-file" accept=".txt,.csv,.hrz,.hzn" />
          <span id="horizon-status"></span>
        </div>
      </div>

      <div class="controls-row">
        <button id="browse-btn" class="btn" data-i18n="browseCatalog">Browse catalog</button>
      </div>
    </section>

    <section id="browse-section" class="hidden">
      <div class="browse-header">
        <h2 data-i18n="bestTargets">Best targets tonight</h2>
        <span id="browse-status" class="browse-status"></span>
      </div>
      <div class="browse-filters">
        <label class="checkbox-label">
          <input type="checkbox" id="filter-messier" checked />
          Messier
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="filter-ngc" checked />
          NGC
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="filter-ic" checked />
          IC
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="filter-caldwell" checked />
          Caldwell
        </label>
        <label class="filter-label">
          <span data-i18n="minAltitude">Min altitude</span>
          <input type="number" id="filter-min-alt" value="20" min="0" max="90" step="5" />&deg;
        </label>
      </div>
      <table id="browse-table" class="browse-table">
        <thead>
          <tr>
            <th data-i18n="objectCol">Object</th>
            <th data-i18n="astroNightCol">Astro night</th>
            <th data-i18n="nightVisibleCol">Night visible</th>
            <th data-i18n="maxAltCol">Max alt</th>
            <th data-i18n="transitCol">Transit</th>
          </tr>
        </thead>
        <tbody id="browse-tbody"></tbody>
      </table>
      <div class="browse-pagination">
        <button id="page-prev" class="btn" disabled>&laquo; <span data-i18n="prev">Prev</span></button>
        <span id="page-info"></span>
        <button id="page-next" class="btn"><span data-i18n="next">Next</span> &raquo;</button>
      </div>
    </section>

    <section id="chart-section" class="hidden">
      <div class="chart-row">
        <div class="chart-options">
          <label class="checkbox-label">
            <input type="checkbox" id="show-moon" checked />
            <span data-i18n="moon">Moon</span>
          </label>
        </div>
        <div class="chart-container">
          <canvas id="altitude-chart"></canvas>
        </div>
        <div id="stats-panel" class="stats-panel"></div>
      </div>
      <div id="info-bar" class="info-bar"></div>
      <div id="weekly-forecast" class="weekly-forecast"></div>
    </section>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Planner</title>
  <script type="module" crossorigin src="./assets/index-VVk3_tDO.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CePmnqdJ.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Astro Planner</h1>
      <button id="fetch-catalog-btn" class="fetch-btn">
        <span id="fetch-btn-text">Load catalog</span>
        <span id="fetch-spinner" class="spinner hidden"></span>
      </button>
    </header>

    <section class="controls">
      <div class="input-group">
        <label for="simbad-input">Object</label>
        <div class="input-with-status">
          <div class="autocomplete-wrapper">
            <input type="text" id="simbad-input" placeholder="e.g. M31, NGC 7000, Vega" autocomplete="off" />
            <ul id="autocomplete-list" class="autocomplete-list hidden"></ul>
          </div>
          <span id="simbad-status" class="status-icon"></span>
        </div>
        <span id="simbad-name" class="resolved-name"></span>
      </div>

      <div class="input-group">
        <label>Location</label>
        <div class="location-fields">
          <input type="number" id="lat-input" step="0.0001" placeholder="Lat" />
          <input type="number" id="lon-input" step="0.0001" placeholder="Lon" />
          <button id="geo-btn" title="Detect location">&#9678;</button>
        </div>
      </div>

      <div class="input-group">
        <label for="min-alt-input">Min altitude</label>
        <div class="min-alt-row">
          <input type="number" id="min-alt-input" value="30" min="0" max="90" step="5" />
          <span class="unit-label">&deg;</span>
        </div>
      </div>

      <div class="input-group">
        <label for="horizon-file">Horizon file</label>
        <div class="file-upload">
          <input type="file" id="horizon-file" accept=".txt,.csv,.hrz,.hzn" />
          <span id="horizon-status"></span>
        </div>
      </div>

      <div class="controls-row">
        <button id="ok-btn" disabled>OK</button>
        <button id="browse-btn">Browse catalog</button>
      </div>
    </section>

    <section id="browse-section" class="hidden">
      <div class="browse-header">
        <h2>Best targets tonight</h2>
        <span id="browse-status" class="browse-status"></span>
      </div>
      <div class="browse-filters">
        <label class="checkbox-label">
          <input type="checkbox" id="filter-messier" checked />
          Messier
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="filter-ngc" checked />
          NGC
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="filter-ic" checked />
          IC
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="filter-caldwell" checked />
          Caldwell
        </label>
        <label class="filter-label">
          Min altitude
          <input type="number" id="filter-min-alt" value="20" min="0" max="90" step="5" />&deg;
        </label>
      </div>
      <table id="browse-table" class="browse-table">
        <thead>
          <tr>
            <th>Object</th>
            <th>Astro night</th>
            <th>Night visible</th>
            <th>Max alt</th>
            <th>Transit</th>
          </tr>
        </thead>
        <tbody id="browse-tbody"></tbody>
      </table>
      <div class="browse-pagination">
        <button id="page-prev" disabled>&laquo; Prev</button>
        <span id="page-info"></span>
        <button id="page-next">Next &raquo;</button>
      </div>
    </section>

    <section id="chart-section" class="hidden">
      <div class="chart-row">
        <div class="chart-options">
          <label class="checkbox-label">
            <input type="checkbox" id="show-moon" checked />
            Moon
          </label>
        </div>
        <div class="chart-container">
          <canvas id="altitude-chart"></canvas>
        </div>
        <div id="stats-panel" class="stats-panel"></div>
      </div>
      <div id="info-bar" class="info-bar"></div>
      <div id="weekly-forecast" class="weekly-forecast"></div>
    </section>
  </div>

</body>
</html>
